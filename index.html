<html lang="en">

<meta charset="UTF-8">

<title>Tanya &amp; Yash — Engagement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Montserrat',sans-serif;background:#fdf6f0;overflow-x:hidden;}

.hero{position:relative;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
.photo-bg{position:absolute;inset:0;background-image:url("data:image/jpeg;base64,''' + photo_b64 + '''");background-size:cover;background-position:center 30%;}
.photo-overlay{position:absolute;inset:0;background:rgba(15,5,2,0.36);}
canvas#flowers{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2;}
.hero-content{position:relative;z-index:3;text-align:center;padding:2rem 1.5rem;}
.invite-label{font-size:15px;letter-spacing:5px;color:#f5d78e;text-transform:uppercase;margin-bottom:0.5rem;}
.invite-to{font-size:15px;letter-spacing:5px;color:#f5d78e;text-transform:uppercase;margin-bottom:1.2rem;}
.names{font-family:'Cormorant Garamond',serif;font-size:clamp(58px,12vw,100px);font-weight:400;font-style:italic;color:#fff8f0;line-height:1.05;text-shadow:0 2px 28px rgba(0,0,0,0.45);}
.ampersand{color:#f0c060;font-size:1.15em;display:block;line-height:0.85;}
.tagline{margin-top:1.5rem;font-size:16px;letter-spacing:5px;color:#f5d78e;text-transform:uppercase;}
.divider{display:flex;align-items:center;gap:12px;justify-content:center;margin:1.3rem auto 0;width:260px;}
.divider-line{flex:1;height:0.5px;background:#f0c060;opacity:0.7;}
.divider-diamond{width:6px;height:6px;background:#f0c060;transform:rotate(45deg);flex-shrink:0;}
.scroll-hint{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);z-index:4;display:flex;flex-direction:column;align-items:center;gap:6px;animation:bobble 2.2s ease-in-out infinite;}
.scroll-hint span{font-size:10px;letter-spacing:3px;color:#f5d78e;text-transform:uppercase;opacity:0.7;}
.scroll-arrow{width:14px;height:14px;border-right:1.5px solid #f0c060;border-bottom:1.5px solid #f0c060;transform:rotate(45deg);margin-top:-4px;opacity:0.8;}
@keyframes bobble{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(7px);}}

/* transition panel */
.transition-panel{height:100vh;display:flex;align-items:center;justify-content:center;background:#0d0304;position:relative;overflow:hidden;}
.petal-burst{position:absolute;inset:0;pointer-events:none;}
.trans-logo{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:1;}
.trans-logo img{width:min(65vw,460px);opacity:0.18;filter:brightness(1.6) saturate(1.2);}
.reveal-text{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,6vw,52px);font-style:italic;color:#f5d78e;text-align:center;opacity:0;transform:scale(0.7);transition:opacity 1.2s ease,transform 1.2s ease;z-index:2;position:relative;line-height:1.5;padding:0 2rem;}
.reveal-text.visible{opacity:1;transform:scale(1);}
.reveal-text em{color:#f0c060;font-size:1.1em;}

/* date section */
.date-section{background:#fdf6f0;padding:5rem 1.5rem 5rem;text-align:center;opacity:0;transform:translateY(60px);transition:opacity 1s ease 0.2s,transform 1s ease 0.2s;position:relative;overflow:hidden;}
.date-section.visible{opacity:1;transform:translateY(0);}
.date-floral{position:absolute;pointer-events:none;}
.date-floral-tl{top:-10px;left:-10px;width:220px;opacity:0.55;transform:rotate(0deg);}
.date-floral-tr{top:-10px;right:-10px;width:220px;opacity:0.55;transform:scaleX(-1);}
.date-floral-bl{bottom:-10px;left:-10px;width:180px;opacity:0.45;transform:rotate(180deg) scaleX(-1);}
.date-floral-br{bottom:-10px;right:-10px;width:180px;opacity:0.45;transform:rotate(180deg);}
.section-label{font-size:11px;letter-spacing:5px;color:#b8860b;text-transform:uppercase;margin-bottom:2.2rem;position:relative;z-index:2;}
.date-card{max-width:440px;margin:0 auto;background:#fff8f4;border:0.5px solid #e8cdb8;border-radius:24px;padding:3.5rem 2.5rem;opacity:0;transform:rotateX(25deg) translateY(40px);transition:opacity 1s ease 0.5s,transform 1s ease 0.5s;position:relative;z-index:2;overflow:hidden;}
.date-card.visible{opacity:1;transform:rotateX(0deg) translateY(0);}
.card-floral-inner{position:absolute;pointer-events:none;}
.card-fl-tl{top:-8px;left:-8px;width:110px;opacity:0.35;transform:rotate(0deg);}
.card-fl-tr{top:-8px;right:-8px;width:110px;opacity:0.35;transform:scaleX(-1);}
.card-fl-bl{bottom:-8px;left:-8px;width:90px;opacity:0.28;transform:rotate(180deg) scaleX(-1);}
.card-fl-br{bottom:-8px;right:-8px;width:90px;opacity:0.28;transform:rotate(180deg);}
.big-date{font-family:'Cormorant Garamond',serif;font-size:clamp(48px,10vw,76px);font-style:italic;color:#b8860b;line-height:1;}
.date-year{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,5vw,38px);font-style:italic;color:#b8860b;margin-top:4px;}
.date-sub{font-size:11px;letter-spacing:5px;color:#a0784a;text-transform:uppercase;margin-top:0.8rem;}
.date-divider{display:flex;align-items:center;gap:10px;justify-content:center;margin:1.6rem auto;}
.ddline{width:60px;height:0.5px;background:#c9a05a;opacity:0.5;}
.date-message{font-family:'Cormorant Garamond',serif;font-size:19px;font-style:italic;color:#7a4a2e;line-height:1.75;}
.heart{color:#c77b6a;font-size:22px;display:block;margin-top:1.2rem;}
.footer-band{background:#3a160a;padding:2rem;text-align:center;color:#f5dcc8;font-size:11px;letter-spacing:4px;text-transform:uppercase;}
</style>

  function resizeHero(){canvas.width=window.innerWidth;canvas.height=document.getElementById('hero').offsetHeight;}
  function shade(hex,p){let n=parseInt(hex.slice(1),16);let r=Math.min(255,Math.max(0,((n>>16)&0xff)+p));let g=Math.min(255,Math.max(0,((n>>8)&0xff)+p));let b=Math.min(255,Math.max(0,(n&0xff)+p));return '#'+(r<<16|g<<8|b).toString(16).padStart(6,'0');}
  function drawRose(c,x,y,r,color,rot,alpha){c.save();c.translate(x,y);c.rotate(rot);for(let i=0;i<5;i++){c.save();c.rotate((i/5)*Math.PI*2);c.beginPath();c.ellipse(0,-r*0.72,r*0.42,r*0.72,0,0,Math.PI*2);c.fillStyle=i%2===0?color:shade(color,-20);c.globalAlpha=alpha*0.72;c.fill();c.restore();}for(let i=0;i<3;i++){c.save();c.rotate((i/3)*Math.PI*2+0.4);c.beginPath();c.ellipse(0,-r*0.38,r*0.28,r*0.4,0,0,Math.PI*2);c.fillStyle=shade(color,-12);c.globalAlpha=alpha*0.68;c.fill();c.restore();}c.beginPath();c.arc(0,0,r*0.22,0,Math.PI*2);c.fillStyle=shade(color,-42);c.globalAlpha=alpha*0.75;c.fill();c.restore();}
  const RC=['#ffffff','#fff5f8','#fff0f4','#fde8f0','#f9c8d8','#f5b0cc','#f0a0c0','#e890b8','#e070a8','#d85098','#cc4090','#c03080','#f8d0e8','#f4c0e0','#eeb0d8'];
  function makeRose(){return{x:Math.random()*canvas.width,y:-35,r:9+Math.random()*13,speedY:0.7+Math.random()*1.5,speedX:(Math.random()-0.5)*0.9,rot:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*0.038,opacity:0.55+Math.random()*0.3,wobble:Math.random()*Math.PI*2,wobbleSpeed:0.016+Math.random()*0.02,color:RC[Math.floor(Math.random()*RC.length)]};}
  function animateRoses(){ctx.clearRect(0,0,canvas.width,canvas.height);if(blooms.length<55)blooms.push(makeRose());blooms=blooms.filter(b=>b.y<canvas.height+50);blooms.forEach(b=>{b.wobble+=b.wobbleSpeed;b.x+=b.speedX+Math.sin(b.wobble)*0.55;b.y+=b.speedY;b.rot+=b.rotSpeed;drawRose(ctx,b.x,b.y,b.r,b.color,b.rot,b.opacity);});ctx.globalAlpha=1;requestAnimationFrame(animateRoses);}
  resizeHero();window.addEventListener('resize',resizeHero);
  for(let i=0;i<28;i++){const b=makeRose();b.y=Math.random()*canvas.height;blooms.push(b);}
  animateRoses();

  const bc=document.getElementById('burstCanvas'),bctx=bc.getContext('2d');
  let burst=[],burstActive=false;
  function resizeBurst(){bc.width=bc.parentElement.offsetWidth;bc.height=bc.parentElement.offsetHeight;}
  resizeBurst();window.addEventListener('resize',resizeBurst);
  function spawnBurst(){const cx=bc.width/2,cy=bc.height/2;for(let i=0;i<120;i++){const ang=Math.random()*Math.PI*2,spd=1+Math.random()*7;burst.push({x:cx,y:cy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,r:6+Math.random()*10,rot:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*0.1,opacity:0.85,color:RC[Math.floor(Math.random()*RC.length)],gravity:0.08+Math.random()*0.06});}}
  function animateBurst(){bctx.clearRect(0,0,bc.width,bc.height);burst=burst.filter(p=>p.opacity>0.02);burst.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.rot+=p.rotSpeed;p.opacity-=0.011;drawRose(bctx,p.x,p.y,p.r,p.color,p.rot,p.opacity);});bctx.globalAlpha=1;if(burst.length>0||burstActive)requestAnimationFrame(animateBurst);}

  let transDone=false;
  new IntersectionObserver(entries=>{if(entries[0].isIntersecting&&!transDone){transDone=true;setTimeout(()=>document.getElementById('revealText').classList.add('visible'),300);setTimeout(()=>{burstActive=true;spawnBurst();animateBurst();setTimeout(()=>{burstActive=false;},3000);},800);}},{threshold:0.4}).observe(document.getElementById('transPanel'));

  let dateDone=false;
  new IntersectionObserver(entries=>{if(entries[0].isIntersecting&&!dateDone){dateDone=true;document.getElementById('dateSection').classList.add('visible');setTimeout(()=>document.getElementById('dateCard').classList.add('visible'),400);}},{threshold:0.25}).observe(document.getElementById('dateSection'));
})();
</script>
</body>
